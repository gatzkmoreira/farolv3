<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Lighthouse beacon rays -->
  <g opacity="0.6">
    <line x1="32" y1="14" x2="18" y2="8" stroke="#fde68a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="14" x2="32" y2="5" stroke="#fde68a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="14" x2="46" y2="8" stroke="#fde68a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Lighthouse lamp glow -->
  <circle cx="32" cy="17" r="5" fill="#fbbf24" opacity="0.5"/>
  <!-- Lighthouse body -->
  <rect x="27" y="14" width="10" height="6" rx="2" fill="#fbbf24"/>
  <polygon points="25,22 39,22 37,48 27,48" fill="white"/>
  <!-- Lighthouse stripes -->
  <rect x="27.8" y="28" width="8.4" height="4" fill="#ef4444" opacity="0.7" rx="0.5"/>
  <rect x="28.4" y="38" width="7.2" height="4" fill="#ef4444" opacity="0.7" rx="0.5"/>
  <!-- Base -->
  <rect x="22" y="48" width="20" height="5" rx="2" fill="white"/>
  <!-- Ground line -->
  <rect x="12" y="53" width="40" height="4" rx="2" fill="white" opacity="0.3"/>
</svg>
